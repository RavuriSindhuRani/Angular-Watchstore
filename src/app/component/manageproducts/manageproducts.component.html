<div class="row">
    <div class="col-md-4" *ngFor="let p of products">
        <div class="card">
            <div class="card-header">
                <img [src]="p.productImage" alt="" height="200" width="200" >
                <h3 class="card-title">{{p.productName}}</h3>
            </div>
            <div class="card-body">
                <p>Model : {{p.productModel}}</p>
                <p class="badge bg-warning">price : {{p.productPrice}}</p>
            </div>
            <div class="card-footer d-flex justify-content-center">
                <button class="btn btn-danger me-5" (click)="deleteNow(p.productId)">Delete</button>
                <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#updateModal" (click)="updateToDummy(p)">Update</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="updateModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Product Name</h2>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="" class="form-label">Product Name</label>
                    <input type="text" class="form-control" [(ngModel)]="dummy.productName">
                </div>
                <div class="form-group">
                    <label for="" class="form-label">Product Price</label>
                    <input type="text" class="form-control" [(ngModel)]="dummy.productPrice">
                </div>
                <div class="form-group">
                    <label for="" class="form-label">Product Model</label>
                    <input type="text" class="form-control" [(ngModel)]="dummy.productModel">
                </div>
                <div class="form-group">
                    <label for="" class="form-label">Product Image</label>
                    <input type="text" class="form-control" [(ngModel)]="dummy.productImage">
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" (click)="StoreInService()" data-bs-dismiss="modal">Update Now</button>
                    
                </div>
            </div>
        </div>
    </div>

</div>
